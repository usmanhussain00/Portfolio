<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

.weather-app{
    width:420px;
    min-height:550px;
    padding:30px;
    border-radius:30px;

    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.3);

    color:white;
}

.head-input{
    border:none;
    border-radius:50px;
    padding:12px 20px;
    background:rgba(255,255,255,0.15);
    color:white !important;
}

.head-input::placeholder{
    color:rgba(255,255,255,0.7);
}

.head-input:focus{
    background:rgba(255,255,255,0.2);
    box-shadow:none;
    border:none;
}

.head-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;

    background:white;
    color:#2c5364;

    transition:.3s;
}

.head-btn:hover{
    transform:scale(1.1);
}

.weather-icon{
    font-size:5rem;
    color:#ffd43b;

    text-shadow:
    0 0 20px rgba(255,212,59,.6);
}

.temp{
    font-size:3rem;
    font-weight:700;
    line-height:1;
}

.desc{
    font-size:1.2rem;
    letter-spacing:1px;
    opacity:.9;
}

.city-name{
    font-size:2rem;
    font-weight:600;
}

.weather-details{
    margin-top:15px;
}

.detail-box{
    background:rgba(255,255,255,.1);
    padding:10px;
    border-radius:18px;
    backdrop-filter:blur(10px);
}

.detail-title{
    font-size:.8rem;
    opacity:.8;
}

.detail-value{
    font-size:1.1rem;
    font-weight:600;
}

.fade-in{
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

    </style>

</head>

<body>

    <!-- MAIN CONTAINER -->
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <!-- WEATHER APP -->
        <div class="weather-app rounded-4 shadow p-3 text-dark">

            <!-- HEADER -->
            <div class="text-center mb-3">
                <h2 class="fw-light">Weather App</h2>
            </div>

            <!-- SEARCH -->
            <form id="weatherForm" class="d-flex mb-3">

                <input
                id="cityInput"
                type="search"
                class="form-control me-2 bg-transparent border-dark text-white head-input"
                placeholder="Enter city">

                <button type="submit"
                class="btn btn-outline-dark head-btn">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

            </form>

            <!-- WEATHER CARD -->
            <!-- WEATHER CARD -->
            <div id="card" class="text-center">

                <div class="text-center mt-5">
                    <i class="fa-solid fa-cloud-sun fs-1 mb-3"></i>
                    <h3>Search a City</h3>
                    <p class="text-light opacity-75">
                        Get live weather updates instantly
                    </p>
                </div>

            </div>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>

        const weatherForm = document.getElementById("weatherForm");
        const cityInput = document.getElementById("cityInput");
        const card = document.getElementById("card");

        // INSERT YOUR API KEY HERE
        const apikey = "5c6714704f0a61ecb68bcadb3e4ba3a0";


        // FORM SUBMIT
        weatherForm.addEventListener("submit", async event => {

            event.preventDefault();

            const city = cityInput.value.trim();

            if(city){

                try{

                    const weatherData = await getWeatherData(city);

                    displayWeatherInfo(weatherData);

                }
                catch(error){

                    console.error(error);

                    displayError(error.message);

                }

            }
            else{

                displayError("Please enter a city");

            }

        });


        // FETCH WEATHER
        async function getWeatherData(city){

            const apiUrl =
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apikey}&units=metric`;

            const response = await fetch(apiUrl);

            if(!response.ok){

                throw new Error("Could not fetch weather data");

            }

            return await response.json();

        }


        // DISPLAY WEATHER
        function displayWeatherInfo(data){

            const {

                name: city,

                main: {
                    temp,
                    humidity,
                    feels_like
                },

                weather: [{
                    description,
                    id
                }],

                wind: {
                    speed
                }

            } = data;

            const fahrenheit = (temp * 1.8 + 32).toFixed(1);

            const icon = getWeatherIcon(id);

            card.innerHTML = `

<div class="fade-in">

    <p class="text-center opacity-75">
        ${new Date().toDateString()}
    </p>

    <h2 class="city-name text-center">
        <i class="fa-solid fa-location-dot"></i>
        ${city}
    </h2>

    <div class="weather-icon text-center my-3">
        ${icon}
    </div>

    <div class="temp text-center">
        ${temp.toFixed(1)}°
    </div>

    <div class="text-center opacity-75 mb-3">
        ${fahrenheit}°F
    </div>

    <h4 class="desc text-capitalize text-center mb-4">
        ${description}
    </h4>

    <div class="row g-3 weather-details">

        <div class="col-4">
            <div class="detail-box text-center">
                <div class="detail-title">
                    Humidity
                </div>
                <div class="detail-value">
                    ${humidity}%
                </div>
            </div>
        </div>

        <div class="col-4">
            <div class="detail-box text-center">
                <div class="detail-title">
                    Feels Like
                </div>
                <div class="detail-value">
                    ${feels_like.toFixed(1)}°
                </div>
            </div>
        </div>

        <div class="col-4">
            <div class="detail-box text-center">
                <div class="detail-title">
                    Wind
                </div>
                <div class="detail-value">
                    ${speed}
                </div>
            </div>
        </div>

    </div>

</div>

`;

        }


        // WEATHER ICONS
        function getWeatherIcon(weatherId){

            if(weatherId >= 200 && weatherId < 300){

                return `<i class="fa-solid fa-cloud-bolt"></i>`;

            }

            else if(weatherId >= 300 && weatherId < 600){

                return `<i class="fa-solid fa-cloud-rain"></i>`;

            }

            else if(weatherId >= 600 && weatherId < 700){

                return `<i class="fa-solid fa-snowflake"></i>`;

            }

            else if(weatherId >= 700 && weatherId < 800){

                return `<i class="fa-solid fa-smog"></i>`;

            }

            else if(weatherId === 800){

                return `<i class="fa-solid fa-sun"></i>`;

            }

            else{

                return `<i class="fa-solid fa-cloud"></i>`;

            }

        }


        // DISPLAY ERROR
        function displayError(message){

            card.innerHTML = "";

            const errorDisplay = document.createElement("p");

            errorDisplay.textContent = message;

            errorDisplay.classList.add("errorDisplay");

            card.appendChild(errorDisplay);

        }

    </script>

</body>
</html>
