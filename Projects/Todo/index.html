<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>
    <style>
        body{
            background-color: #cfe3e3;
        }
        .todo-card{
            background-color: #cfe3e3;
            border-radius: 15px;
        }
        .task-item{
            background-color: white;
            border-radius: 8px;
            padding: 10px;
        }
    </style>

</head>
<body>

    <!-- -----------TODO APP------------ -->

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card todo-card p-4 shadow">

            <!-- input section  -->
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Add Task">
                <button class="btn btn-primary" onclick="addTask()">Add</button>
            </div>

            <!-- task list  -->
            <ul id="tasklist" class="list-unstyled"></ul>
        </div>

    </div>
    
    <script>

        function addTask(){
            let input = document.getElementById('taskInput');
            let taskText = input.value.trim();

            // Empty check
            if(taskText === '') {
                alert('Please enter a task');               
                return;
            }

            //create li
            let li = document.createElement('li');
            li.className = 'task-item d-flex justify-content-between align-items-center mb-2';

            // Task text
            let span = document.createElement('span');
            span.textContent = taskText;

            //delete button
            let deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn btn-danger btn-sm';
            deleteBtn.textContent = 'Delete';


            deleteBtn.onclick = function(){
                li.remove();
            }

            // Append element 
            li.appendChild(span);
            li.appendChild(deleteBtn);

            document.getElementById('tasklist').appendChild(li);

            //clear input
            input.value = "";
        }
    </script>
</body>
</html>
