<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Stopwatch</title>

    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:'Segoe UI',sans-serif;
        }

        .stopwatch-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:25px;
            backdrop-filter:blur(15px);
            background:rgba(255,255,255,0.08);
            box-shadow:0 15px 40px rgba(0,0,0,.3);
            padding:30px;
        }

        .title{
            text-align:center;
            color:white;
            font-weight:700;
            margin-bottom:25px;
            letter-spacing:1px;
        }

        .timer-box{
            height:120px;
            border-radius:20px;
            background:linear-gradient(135deg,#0d6efd,#4f46e5);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:3rem;
            font-weight:bold;
            box-shadow:0 10px 25px rgba(13,110,253,.4);
        }

        .btn{
            border-radius:12px;
            padding:10px 18px;
            font-weight:600;
        }

        .controls{
            margin-top:25px;
        }

        @media(max-width:576px){
            .timer-box{
                font-size:2.2rem;
                height:100px;
            }

            .btn{
                width:100%;
            }

            .controls{
                gap:10px;
            }
        }
    </style>
</head>
<body>

<div class="stopwatch-card">

    <h2 class="title">⏱ Stopwatch</h2>

    <div class="timer-box">
        <span id="m">00</span>
        <span class="mx-2">:</span>
        <span id="s">00</span>
    </div>

    <div class="controls d-flex flex-wrap justify-content-center">
        <button id="btn_reset" class="btn btn-outline-light">
            Reset
        </button>

        <button id="btn_start" class="btn btn-primary mx-2">
            Start
        </button>

        <button id="btn_stop" class="btn btn-outline-light">
            Stop
        </button>
    </div>

</div>

<script>
    let minutes = 0;
    let seconds = 0;
    let timer = null;

    document.getElementById('btn_start').onclick = () => {

        if(timer !== null) return;

        timer = setInterval(() => {

            seconds++;

            if(seconds >= 60){
                minutes++;
                seconds = 0;
            }

            document.getElementById('m').textContent =
                minutes < 10 ? "0" + minutes : minutes;

            document.getElementById('s').textContent =
                seconds < 10 ? "0" + seconds : seconds;

        },1000);
    }

    document.getElementById('btn_stop').onclick = () => {
        clearInterval(timer);
        timer = null;
    }

    document.getElementById('btn_reset').onclick = () => {

        clearInterval(timer);
        timer = null;

        minutes = 0;
        seconds = 0;

        document.getElementById('m').textContent = "00";
        document.getElementById('s').textContent = "00";
    }
</script>

</body>
</html>
