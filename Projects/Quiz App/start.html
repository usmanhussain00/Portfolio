<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App Start Screen</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#667eea,#764ba2);
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Background Glow */

        body::before{
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            filter: blur(40px);
        }

        body::after{
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            filter: blur(40px);
        }

        /* Start Screen */

        .start-screen{
            width: 600px;
            padding: 50px 40px;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            color: white;
            text-align: center;
            animation: fadeIn 0.7s ease;
            position: relative;
            z-index: 10;
        }

        /* Animation */

        @keyframes fadeIn{

            from{
                opacity: 0;
                transform: translateY(20px);
            }

            to{
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* Icon */

        .start-icon{
            font-size: 90px;
            color: #ffd166;
            text-shadow: 0 0 20px rgba(255,209,102,0.5);
        }

        /* Subtitle */

        .subtitle{
            color: rgba(255,255,255,0.8);
            line-height: 1.7;
            font-size: 17px;
        }

        /* Quiz Info */

        .quiz-info{
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 35px;
            margin-bottom: 35px;
        }

        .info-card{
            width: 150px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .info-card:hover{
            transform: translateY(-8px);
            background: rgba(255,255,255,0.18);
        }

        .info-card i{
            font-size: 32px;
            margin-bottom: 12px;
            color: #00e0ff;
        }

        .info-card h5{
            font-size: 18px;
        }

        /* Button */

        .start-btn{
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 40px;
            background: linear-gradient(to right,#00c6ff,#0072ff);
            color: white;
            transition: 0.3s;
        }

        .start-btn:hover{
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,114,255,0.4);
        }

        /* Responsive */

        @media(max-width:700px){

            .start-screen{
                width: 95%;
                padding: 40px 20px;
            }

            .quiz-info{
                flex-direction: column;
                align-items: center;
            }

            .info-card{
                width: 100%;
            }

        }

    </style>
</head>

<body>

    <!-- START SCREEN -->

    <div class="start-screen">

        <!-- Icon -->
        <div class="mb-4">
            <i class="bi bi-patch-question-fill start-icon"></i>
        </div>

        <!-- Title -->
        <h1 class="fw-bold mb-3">
            Welcome to Quiz App
        </h1>

        <!-- Subtitle -->
        <p class="subtitle">
            Test your HTML, CSS, JavaScript and PHP skills
            with fun beginner-friendly questions.
        </p>

        <!-- Info Cards -->
        <div class="quiz-info">

            <div class="info-card">
                <i class="bi bi-question-circle-fill"></i>
                <h5>10 Questions</h5>
            </div>

            <div class="info-card">
                <i class="bi bi-clock-fill"></i>
                <h5>15 Seconds</h5>
            </div>

            <div class="info-card">
                <i class="bi bi-trophy-fill"></i>
                <h5>Score Points</h5>
            </div>

        </div>

        <!-- Start Button -->
        <button class="btn start-btn" >
            <a href="index.html">Start Quiz</a>
            <i class="bi bi-play-circle-fill ms-2"></i>
        </button>

    </div>

</body>
</html>
