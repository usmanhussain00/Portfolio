<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Quiz App</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        /* Background Glow */
        body::before{
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            filter: blur(40px);
        }

        body::after{
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            filter: blur(40px);
        }

        /* Quiz Card */
        .quiz-card{
            width: 550px;
            border: none;
            border-radius: 25px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            color: white;
            animation: fadeIn 0.6s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn{
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .card-header{
            background: transparent;
            border: none;
            padding: 25px;
        }

        .card-header h2{
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Top Info */
        .info-box{
            background: rgba(255,255,255,0.1);
            padding: 12px 18px;
            border-radius: 15px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        #timer{
            color: #ffd166;
        }

        /* Question */
        #question{
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.5;
        }

        /* Options */
        .option-box{
            background: rgba(255,255,255,0.08);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .option-box:hover{
            background: rgba(255,255,255,0.18);
            transform: translateX(5px);
            border-color: rgba(255,255,255,0.3);
        }

        .form-check-input{
            transform: scale(1.2);
            cursor: pointer;
        }

        .form-check-label{
            cursor: pointer;
            width: 100%;
            margin-left: 10px;
            font-size: 1rem;
        }

        /* Button */
        #next{
            padding: 10px 30px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            background: linear-gradient(to right,#00c6ff,#0072ff);
            transition: 0.3s;
        }

        #next:hover{
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,114,255,0.4);
        }

        /* Progress */
        .progress{
            height: 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }

        .progress-bar{
            background: linear-gradient(to right,#00f260,#0575e6);
            transition: width 0.5s ease;
        }

        /* Footer */
        .card-footer{
            background: transparent;
            border: none;
            padding: 20px;
        }

        /* Responsive */
        @media(max-width:600px){

            .quiz-card{
                width: 95%;
            }

            #question{
                font-size: 1.1rem;
            }

        }

    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card quiz-card">

            <!-- Header -->
            <div class="card-header text-center">
                <h2>
                    <i class="bi bi-patch-question-fill"></i>
                    Quiz App
                </h2>
            </div>

            <!-- Body -->
            <div class="card-body px-4">

                <!-- Top Info -->
                <div class="d-flex justify-content-between mb-4">

                    <div class="info-box">
                        <i class="bi bi-bookmark-star-fill"></i>
                        Question <span id="question-count">1</span>/10
                    </div>

                    <div class="info-box">
                        <i class="bi bi-clock-fill"></i>
                        <span id="timer">15s</span>
                    </div>

                </div>

                <!-- Question -->
                <div class="mb-4">
                    <h5 id="question">
                        Question goes here
                    </h5>
                </div>

                <!-- Options -->
                <div class="mt-3">

                    <div class="form-check option-box d-flex align-items-center">
                        <input class="form-check-input" type="radio" name="quiz" id="option1">
                        <label class="form-check-label option-label" for="option1">
                            Option 1
                        </label>
                    </div>

                    <div class="form-check option-box d-flex align-items-center">
                        <input class="form-check-input" type="radio" name="quiz" id="option2">
                        <label class="form-check-label option-label" for="option2">
                            Option 2
                        </label>
                    </div>

                    <div class="form-check option-box d-flex align-items-center">
                        <input class="form-check-input" type="radio" name="quiz" id="option3">
                        <label class="form-check-label option-label" for="option3">
                            Option 3
                        </label>
                    </div>

                    <div class="form-check option-box d-flex align-items-center">
                        <input class="form-check-input" type="radio" name="quiz" id="option4">
                        <label class="form-check-label option-label" for="option4">
                            Option 4
                        </label>
                    </div>

                </div>

                <!-- Button -->
                <div class="d-flex justify-content-end mt-4">
                    <button class="btn text-white" id="next">
                        Next
                        <i class="bi bi-arrow-right-circle-fill"></i>
                    </button>
                </div>

            </div>

            <!-- Footer -->
            <div class="card-footer">

                <div class="progress">

                    <div
                        class="progress-bar"
                        id="progress-bar"
                        role="progressbar"
                        style="width: 0%">
                    </div>

                </div>

            </div>

        </div>

    </div>





    <!-- JAVASCRIPT -->
    <script>

        // QUESTIONS ARRAY
        const questions = [

            {
                question: "What does HTML stand for?",
                options: [
                    "Hyper Text Markup Language",
                    "High Text Machine Language",
                    "Hyper Tool Multi Language",
                    "Home Text Markup Language"
                ],
                correctAnswer: "Hyper Text Markup Language"
            },

            {
                question: "Which HTML tag is used to create a paragraph?",
                options: [
                    "h1",
                    "p",
                    "div",
                    "span"
                ],
                correctAnswer: "p"
            },

            {
                question: "Which CSS property changes text color?",
                options: [
                    "background-color",
                    "font-size",
                    "color",
                    "text-style"
                ],
                correctAnswer: "color"
            },

            {
                question: "Which CSS property is used to make text bold?",
                options: [
                    "font-style",
                    "font-weight",
                    "text-decoration",
                    "font-family"
                ],
                correctAnswer: "font-weight"
            },

            {
                question: "Which symbol is used for comments in JavaScript?",
                options: [
                    "//",
                    "<!-- -->",
                    "#",
                    "/* */"
                ],
                correctAnswer: "//"
            },

            {
                question: "Which keyword is used to declare a variable in JavaScript?",
                options: [
                    "int",
                    "string",
                    "var",
                    "echo"
                ],
                correctAnswer: "var"
            },

            {
                question: "Which JavaScript method displays an alert box?",
                options: [
                    "console.log()",
                    "prompt()",
                    "alert()",
                    "write()"
                ],
                correctAnswer: "alert()"
            },

            {
                question: "What does PHP stand for?",
                options: [
                    "Private Home Page",
                    "PHP Hypertext Processor",
                    "Personal Hyper Processor",
                    "Programming Home Page"
                ],
                correctAnswer: "PHP Hypertext Processor"
            },

            {
                question: "Which PHP symbol is used before variables?",
                options: [
                    "#",
                    "@",
                    "$",
                    "%"
                ],
                correctAnswer: "$"
            },

            {
                question: "Which PHP function is used to output text?",
                options: [
                    "print()",
                    "echo",
                    "write()",
                    "display()"
                ],
                correctAnswer: "echo"
            }

        ];



        // VARIABLES
        let currentQuestion = 0;
        let score = 0;
        let timeLeft = 15;
        let timer;



        // DOM ELEMENTS
        const questionText = document.getElementById("question");

        const optionLabels = document.querySelectorAll(".option-label");

        const optionInputs = document.querySelectorAll(".form-check-input");

        const questionCounter = document.getElementById("question-count");

        const timerBox = document.getElementById("timer");

        const nextBtn = document.getElementById("next");

        const progressBar = document.getElementById("progress-bar");




        // LOAD QUESTION
        function loadQuestion() {

            // reset radio buttons
            optionInputs.forEach(input => {
                input.checked = false;
            });

            let q = questions[currentQuestion];

            // question text
            questionText.textContent = q.question;

            // options
            optionLabels.forEach((label, index) => {
                label.textContent = q.options[index];
            });

            // question number
            questionCounter.textContent = currentQuestion + 1;

            // update progress
            updateProgress();

            // start timer
            startTimer();
        }




        // TIMER FUNCTION
        function startTimer() {

            clearInterval(timer);

            timeLeft = 15;

            timerBox.textContent = `${timeLeft}s`;

            timer = setInterval(() => {

                timeLeft--;

                timerBox.textContent = `${timeLeft}s`;

                if(timeLeft === 0){

                    nextQuestion();

                }

            }, 1000);

        }




        // GET SELECTED ANSWER
        function getSelectedAnswer() {

            let selected = null;

            optionInputs.forEach((input, index) => {

                if(input.checked){

                    selected = optionLabels[index].textContent;

                }

            });

            return selected;

        }




        // CHECK ANSWER
        function checkAnswer() {

            let answer = getSelectedAnswer();

            if(answer === questions[currentQuestion].correctAnswer){

                score++;

            }

        }




        // NEXT QUESTION
        function nextQuestion() {

            checkAnswer();

            currentQuestion++;

            if(currentQuestion < questions.length){

                loadQuestion();

            }
            else{

                showResult();

            }

        }




        // UPDATE PROGRESS BAR
        function updateProgress() {

            let progress = ((currentQuestion + 1) / questions.length) * 100;

            progressBar.style.width = `${progress}%`;

        }




        // SHOW RESULT
        function showResult() {

            clearInterval(timer);

            document.querySelector(".card-body").innerHTML = `

                <h2 class="text-center">
                    Quiz Completed
                </h2>

                <h3 class="text-center mt-3">
                    Score: ${score}/${questions.length}
                </h3>

                <button 
                    class="btn btn-success w-100 mt-3"
                    onclick="restartQuiz()"
                >
                    Restart
                </button>

            `;

        }




        // RESTART QUIZ
        function restartQuiz() {

            currentQuestion = 0;

            score = 0;

            location.reload();

        }




        // BUTTON EVENT
        nextBtn.addEventListener("click", nextQuestion);




        // LOAD FIRST QUESTION
        loadQuestion();

    </script>

</body>
</html>
